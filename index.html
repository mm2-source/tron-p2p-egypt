<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OKX P2P Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700&display=swap');
        body { background-color: #ffffff; font-family: 'IBM Plex Sans Arabic', sans-serif; overflow-x: hidden; }
        .page { display: none; padding-bottom: 100px; animation: fadeIn 0.3s; }
        .page-active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Bottom Nav Styling */
        .nav-container { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 25%; z-index: 2; cursor: pointer; color: #999; transition: color 0.3s; }
        .nav-item.active { color: #000; }
        
        /* الـ Indicator الأسود المتحرك */
        .nav-indicator { position: absolute; bottom: 8px; height: 45px; background: #f3f3f3; border-radius: 12px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; width: 20%; }
        
        .price-font { font-family: 'Inter', sans-serif; font-weight: 800; }
        .tab-underline { position: absolute; bottom: 0; height: 2px; background: #000; transition: all 0.3s; }
        .empty-state-icon { font-size: 60px; color: #e5e7eb; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav class="flex justify-between items-center p-4 bg-white border-b sticky top-0 z-50">
    <div class="flex items-center gap-2">
        <span class="text-2xl font-black italic">OKX</span>
        <div id="walletStatus" onclick="connectWallet()" class="text-[10px] bg-red-50 text-red-600 px-3 py-1 rounded-full font-bold cursor-pointer">ربط المحفظة</div>
    </div>
    <div class="flex gap-4"><i class="fa-solid fa-plus text-lg" onclick="showPage('create')"></i></div>
</nav>

<div id="p2pPage" class="page page-active">
    <div class="flex gap-8 px-4 border-b bg-white">
        <button class="tab-btn active font-bold py-2 border-b-2 border-black" onclick="setMarket('buy', this)">شراء</button>
        <button class="tab-btn font-bold py-2 text-gray-400" onclick="setMarket('sell', this)">بيع</button>
    </div>
    <div id="marketList" class="px-4 mt-2 space-y-4"></div>
</div>

<div id="ordersPage" class="page">
    <div class="flex px-4 border-b">
        <button onclick="renderOrders('pending', this)" class="order-tab flex-1 py-3 text-sm font-bold border-b-2 border-black">قيد التنفيذ</button>
        <button onclick="renderOrders('completed', this)" class="order-tab flex-1 py-3 text-sm text-gray-400">مكتملة</button>
        <button onclick="renderOrders('cancelled', this)" class="order-tab flex-1 py-3 text-sm text-gray-400">ملغي</button>
    </div>
    <div id="ordersList" class="px-4 mt-4 space-y-4"></div>
</div>

<div id="adsPage" class="page">
    <div class="flex px-4 border-b items-center gap-6">
        <button onclick="switchAdTab('active', this)" class="ad-tab py-3 text-sm font-bold border-b-2 border-black">نشط <span id="activeCount">0</span></button>
        <button onclick="switchAdTab('inactive', this)" class="ad-tab py-3 text-sm text-gray-400">غير نشط <span id="inactiveCount">0</span></button>
    </div>
    
    <div id="myAdsList" class="px-4">
        <div id="emptyAds" class="flex flex-col items-center justify-center mt-32 text-center">
            <i class="fa-solid fa-bullhorn empty-state-icon"></i>
            <h3 class="text-lg font-bold mb-1">لم يتم العثور على إعلانات</h3>
            <p class="text-xs text-gray-400 mb-6">أنشئ إعلاناً لشراء العملات الرقمية أو بيعها.</p>
            <button onclick="showPage('create')" class="bg-black text-white px-10 py-3 rounded-full font-bold text-sm">إنشاء إعلان</button>
        </div>
        <div id="adsContainer" class="mt-4 space-y-3"></div>
    </div>
</div>

<div class="nav-container">
    <div id="indicator" class="nav-indicator" style="right: 2.5%;"></div>
    <div onclick="changeNav('p2p', 0)" class="nav-item active"><i class="fa-solid fa-house text-lg"></i><span class="text-[9px] mt-1">P2P</span></div>
    <div onclick="changeNav('orders', 1)" class="nav-item"><i class="fa-solid fa-receipt text-lg"></i><span class="text-[9px] mt-1">الطلبات</span></div>
    <div onclick="changeNav('ads', 2)" class="nav-item"><i class="fa-solid fa-bullhorn text-lg"></i><span class="text-[9px] mt-1">إعلاناتي</span></div>
    <div onclick="changeNav('profile', 3)" class="nav-item"><i class="fa-solid fa-user text-lg"></i><span class="text-[9px] mt-1">صفحتي</span></div>
</div>

<script type="module" src="src/js/main.js"></script>
</body>
</html>
