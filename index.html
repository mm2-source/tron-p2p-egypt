<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tron P2P Egypt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=IBM+Plex+Sans+Arabic:wght@400;700&display=swap');
        body { background-color: #ffffff; font-family: 'IBM Plex Sans Arabic', sans-serif; }
        .page { display: none; padding-bottom: 100px; }
        .page-active { display: block; }
        .okx-bg-green { background-color: #00b07c; color: #fff; }
        .tab-btn { padding-bottom: 8px; color: #999; font-size: 15px; border-bottom: 2px solid transparent; }
        .tab-btn.active { border-bottom: 2px solid #000; color: #000; font-weight: 900; }
        .nav-item { color: #999; cursor: pointer; text-align: center; font-size: 10px; }
        .nav-item.active { color: #000; font-weight: bold; }
        .price-font { font-family: 'Inter', sans-serif; font-weight: 800; }
        .pay-tag { font-size: 10px; padding: 2px 6px; border-radius: 2px; font-weight: bold; display: inline-block; margin-right: 4px; }
        .pay-Instapay { background-color: #632e8d; color: white; }
        .pay-Vodafone { background-color: #e60000; color: white; }
        .pay-Bank { background-color: #f4b400; color: white; }
    </style>
</head>
<body>

<nav class="flex justify-between items-center p-4 border-b border-gray-50 sticky top-0 bg-white z-50">
    <div class="flex items-center gap-3">
        <span class="text-2xl font-black uppercase tracking-tighter">OKX</span>
        <div id="walletStatus" onclick="connectWallet()" 
             class="text-[10px] bg-red-50 text-red-500 px-3 py-1.5 rounded-full font-bold cursor-pointer border border-red-100">
            ربط المحفظة
        </div>
    </div>
    <div class="flex gap-4">
        <i class="fa-solid fa-plus text-lg" onclick="showPage('create')"></i>
        <i class="fa-solid fa-bars-staggered text-lg"></i>
    </div>
</nav>

<!-- P2P Market -->
<div id="p2pPage" class="page page-active">
    <div class="flex gap-8 px-4 border-b border-gray-50 bg-white sticky top-[65px] z-40">
        <button class="tab-btn active" onclick="setMarket('buy', this)">شراء</button>
        <button class="tab-btn" onclick="setMarket('sell', this)">بيع</button>
    </div>
    <div id="marketList" class="px-4 mt-6 space-y-8"></div>
</div>

<!-- My Ads Page -->
<div id="adsPage" class="page px-4">
    <h2 class="text-2xl font-bold mt-4">إعلاناتي</h2>
    <div class="flex gap-6 border-b border-gray-100 mt-4">
        <button onclick="renderMyAds('active', this)" class="tab-btn active" id="activeAdsCount">نشط (0)</button>
        <button onclick="renderMyAds('inactive', this)" class="tab-btn" id="inactiveAdsCount">غير نشط (0)</button>
    </div>
    <div id="myAdsList" class="mt-8"></div>
</div>

<!-- Orders Page -->
<div id="ordersPage" class="page px-4">
    <h2 class="text-2xl font-bold mt-4">طلباتي</h2>
    <div class="flex gap-6 border-b border-gray-100 mt-4 text-sm overflow-x-auto">
        <button class="tab-btn active" onclick="switchOrderTab('pending', this)">قيد التنفيذ</button>
        <button class="tab-btn" onclick="switchOrderTab('completed', this)">مكتملة</button>
        <button class="tab-btn" onclick="switchOrderTab('cancelled', this)">ملغي</button>
    </div>
    <div id="ordersList" class="mt-6 space-y-4"></div>
</div>

<!-- Create Ad Page - محسنة أكثر احترافية -->
<div id="createPage" class="page px-4">
    <div class="flex items-center gap-4 mt-6 mb-6">
        <i class="fa-solid fa-xmark text-2xl" onclick="showPage('p2p')"></i>
        <h2 class="text-xl font-bold">نشر إعلان</h2>
    </div>

    <div class="space-y-6">
        <!-- نوع الإعلان -->
        <div class="bg-gray-100 p-1 rounded-2xl flex">
            <button id="formBuy" onclick="setFormType('buy')" 
                    class="flex-1 py-4 rounded-xl font-bold bg-white text-green-600 shadow-sm">شراء USDT</button>
            <button id="formSell" onclick="setFormType('sell')" 
                    class="flex-1 py-4 rounded-xl font-bold text-gray-400">بيع USDT</button>
        </div>

        <!-- السعر -->
        <div>
            <p class="text-sm text-gray-500 mb-2">السعر (EGP)</p>
            <input id="inPrice" type="number" step="0.01" placeholder="مثال: 53.14" 
                   class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold text-3xl price-font">
        </div>

        <!-- الكمية -->
        <div>
            <p class="text-sm text-gray-500 mb-2">الكمية (USDT)</p>
            <input id="inAmount" type="number" step="0.01" placeholder="الكمية المتاحة" 
                   class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold text-3xl price-font">
        </div>

        <!-- الحدود -->
        <div class="grid grid-cols-2 gap-4">
            <div>
                <p class="text-sm text-gray-500 mb-2">الحد الأدنى (EGP)</p>
                <input id="inMin" type="number" placeholder="100" 
                       class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold">
            </div>
            <div>
                <p class="text-sm text-gray-500 mb-2">الحد الأقصى (EGP)</p>
                <input id="inMax" type="number" placeholder="50000" 
                       class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold">
            </div>
        </div>

        <!-- طريقة الدفع -->
        <div>
            <p class="text-sm text-gray-500 mb-2">طريقة الدفع</p>
            <select id="inPayment" class="w-full p-5 bg-gray-50 rounded-2xl font-bold outline-none">
                <option value="Instapay">Instapay</option>
                <option value="Vodafone">Vodafone Cash</option>
                <option value="Bank">تحويل بنكي</option>
            </select>
        </div>

        <button onclick="validateAndSubmit()" 
                class="w-full okx-bg-green py-6 rounded-3xl font-bold text-lg shadow-lg mt-4">
            نشر الإعلان
        </button>
    </div>
</div>

<!-- Bottom Navigation -->
<div class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-3 z-50">
    <div onclick="showPage('p2p')" id="nav-p2p" class="nav-item active">
        <i class="fa-solid fa-house-chimney text-2xl mb-1"></i><br>P2P
    </div>
    <div onclick="showPage('orders')" id="nav-orders" class="nav-item">
        <i class="fa-solid fa-receipt text-2xl mb-1"></i><br>الطلبات
    </div>
    <div onclick="showPage('ads')" id="nav-ads" class="nav-item">
        <i class="fa-solid fa-bullhorn text-2xl mb-1"></i><br>إعلاناتي
    </div>
</div>

<script type="module" src="src/js/main.js"></script>
</body>
</html>
