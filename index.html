<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OKX P2P Egypt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=IBM+Plex+Sans+Arabic:wght@400;700&display=swap');
        body { background-color: #ffffff; font-family: 'IBM Plex Sans Arabic', sans-serif; -webkit-tap-highlight-color: transparent; }
        .page { display: none; padding-bottom: 100px; }
        .page-active { display: block; }
        .tab-btn { padding-bottom: 8px; color: #666; font-size: 14px; border-bottom: 3px solid transparent; font-weight: 600; outline: none; }
        .tab-btn.active { border-bottom: 3px solid #000; color: #000; font-weight: 900; }
        .nav-item { color: #666; cursor: pointer; text-align: center; font-size: 10px; transition: all 0.2s; }
        .nav-item.active { color: #000; font-weight: bold; }
        .price-font { font-family: 'Inter', sans-serif; font-weight: 800; }
        .pay-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: bold; background: #f3f4f6; color: #374151; }
    </style>
</head>
<body>

<nav class="flex justify-between items-center p-4 border-b border-gray-50 sticky top-0 bg-white z-50">
    <div class="flex items-center gap-3">
        <span class="text-2xl font-black uppercase tracking-tighter">OKX</span>
        <div id="walletStatus" onclick="connectWallet()" 
             class="text-[10px] bg-red-50 text-red-600 px-3 py-1.5 rounded-full font-bold cursor-pointer border border-red-100 whitespace-nowrap">
            ربط المحفظة
        </div>
    </div>
    <div class="flex gap-4">
        <i class="fa-solid fa-plus text-lg" onclick="showPage('create')"></i>
        <i class="fa-solid fa-bars-staggered text-lg"></i>
    </div>
</nav>

<div id="p2pPage" class="page page-active">
    <div class="flex gap-8 px-4 border-b border-gray-50 bg-white sticky top-[65px] z-40">
        <button class="tab-btn active" onclick="setMarket('buy', this)">شراء</button>
        <button class="tab-btn" onclick="setMarket('sell', this)">بيع</button>
    </div>
    <div id="marketList" class="px-4 mt-6 space-y-8"></div>
</div>

<div id="adsPage" class="page px-4">
    <h2 class="text-xl font-bold mt-4">إعلاناتي</h2>
    <div class="flex gap-6 border-b border-gray-100 mt-4">
        <button onclick="renderMyAds('active', this)" class="tab-btn active" id="activeAdsCount">نشط (0)</button>
        <button onclick="renderMyAds('inactive', this)" class="tab-btn" id="inactiveAdsCount">غير نشط (0)</button>
    </div>
    <div id="myAdsList" class="mt-6 space-y-4"></div>
</div>

<div id="ordersPage" class="page px-4">
    <h2 class="text-xl font-bold mt-4">طلباتي</h2>
    <div class="flex gap-6 border-b border-gray-100 mt-4 text-sm overflow-x-auto">
        <button class="tab-btn active" onclick="switchOrderTab('pending', this)">قيد التنفيذ</button>
        <button class="tab-btn" onclick="switchOrderTab('completed', this)">مكتملة</button>
        <button class="tab-btn" onclick="switchOrderTab('cancelled', this)">ملغي</button>
    </div>
    <div id="ordersList" class="mt-6 space-y-4"></div>
</div>

<div id="createPage" class="page px-4">
    <div class="flex items-center gap-4 mt-6 mb-8">
        <i class="fa-solid fa-xmark text-xl" onclick="showPage('p2p')"></i>
        <h2 class="text-lg font-bold">نشر إعلان</h2>
    </div>
    <div class="space-y-5">
        <div class="bg-gray-100 p-1 rounded-2xl flex">
            <button id="formBuy" onclick="setFormType('buy')" class="flex-1 py-3 rounded-xl font-bold bg-white text-green-600 shadow">شراء</button>
            <button id="formSell" onclick="setFormType('sell')" class="flex-1 py-3 rounded-xl font-bold text-gray-400">بيع</button>
        </div>
        <input id="inPrice" type="number" placeholder="السعر (EGP)" class="w-full p-4 bg-gray-50 rounded-xl outline-none font-bold text-xl price-font">
        <input id="inAmount" type="number" placeholder="الكمية (USDT)" class="w-full p-4 bg-gray-50 rounded-xl outline-none font-bold text-xl price-font">
        <div class="grid grid-cols-2 gap-3">
            <input id="inMin" type="number" placeholder="الحد الأدنى" class="p-4 bg-gray-50 rounded-xl outline-none font-bold text-sm">
            <input id="inMax" type="number" placeholder="الحد الأقصى" class="p-4 bg-gray-50 rounded-xl outline-none font-bold text-sm">
        </div>
        <select id="inPayment" class="w-full p-4 bg-gray-50 rounded-xl font-bold outline-none text-sm">
            <option value="Instapay">Instapay</option>
            <option value="Vodafone">Vodafone Cash</option>
            <option value="Bank">Bank Transfer</option>
        </select>
        <button id="submitBtn" onclick="validateAndSubmit()" class="w-full py-4 rounded-full font-bold text-md bg-black text-white shadow-lg">تأكيد النشر</button>
    </div>
</div>

<div class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-3 z-50">
    <div onclick="showPage('p2p')" id="nav-p2p" class="nav-item active">
        <i class="fa-solid fa-house-chimney text-xl mb-1"></i><br>P2P
    </div>
    <div onclick="showPage('orders')" id="nav-orders" class="nav-item">
        <i class="fa-solid fa-receipt text-xl mb-1"></i><br>الطلبات
    </div>
    <div onclick="showPage('ads')" id="nav-ads" class="nav-item">
        <i class="fa-solid fa-bullhorn text-xl mb-1"></i><br>إعلاناتي
    </div>
</div>

<script type="module" src="src/js/main.js"></script>
</body>
</html>
