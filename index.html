<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tron P2P Egypt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap');
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; }
        .page { display: none; padding-bottom: 80px; }
        .page-active { display: block; }
        .okx-bg-green { background-color: #00b07c; color: white; }
        .tab-btn { padding: 12px 0; font-weight: 600; color: #666; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #000; border-bottom: 3px solid #000; }
        .nav-item { color: #666; font-size: 10px; }
        .nav-item.active { color: #000; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50">

<!-- Navbar -->
<nav class="bg-white border-b sticky top-0 z-50">
    <div class="flex justify-between items-center p-4">
        <div class="flex items-center gap-3">
            <span class="text-3xl font-black tracking-tighter">TronP2P</span>
        </div>
        <div id="walletStatus" onclick="connectWallet()" 
             class="px-5 py-2.5 bg-red-50 text-red-600 text-sm font-bold rounded-3xl cursor-pointer border border-red-200 hover:bg-red-100 transition">
            ربط المحفظة
        </div>
    </div>
</nav>

<!-- P2P Market Page -->
<div id="p2pPage" class="page page-active px-4 pt-4">
    <div class="flex border-b border-gray-200">
        <button onclick="setMarket('buy', this)" id="buyTab" 
                class="tab-btn active flex-1 text-center">شراء USDT</button>
        <button onclick="setMarket('sell', this)" id="sellTab" 
                class="tab-btn flex-1 text-center">بيع USDT</button>
    </div>
    <div id="marketList" class="mt-6 space-y-5"></div>
</div>

<!-- Create Ad Page -->
<div id="createPage" class="page px-4 pt-4">
    <div class="flex items-center gap-4 mb-8">
        <i onclick="showPage('p2p')" class="fa-solid fa-arrow-right text-2xl cursor-pointer"></i>
        <h2 class="text-2xl font-bold">نشر إعلان جديد</h2>
    </div>

    <div class="space-y-6">
        <div class="flex bg-gray-100 p-1 rounded-3xl">
            <button id="formBuyBtn" onclick="setFormType('buy')" 
                    class="flex-1 py-4 rounded-3xl font-bold bg-white shadow-sm">شراء</button>
            <button id="formSellBtn" onclick="setFormType('sell')" 
                    class="flex-1 py-4 rounded-3xl font-bold text-gray-400">بيع</button>
        </div>

        <input id="priceInput" type="number" step="0.01" placeholder="السعر بالجنيه المصري (EGP)" 
               class="w-full p-5 bg-white rounded-3xl text-2xl font-bold outline-none border border-gray-100">

        <input id="amountInput" type="number" step="0.01" placeholder="الكمية بالـ USDT" 
               class="w-full p-5 bg-white rounded-3xl text-2xl font-bold outline-none border border-gray-100">

        <div class="grid grid-cols-2 gap-4">
            <input id="minInput" type="number" placeholder="الحد الأدنى (EGP)" 
                   class="p-5 bg-white rounded-3xl outline-none border border-gray-100">
            <input id="maxInput" type="number" placeholder="الحد الأقصى (EGP)" 
                   class="p-5 bg-white rounded-3xl outline-none border border-gray-100">
        </div>

        <select id="paymentMethod" class="w-full p-5 bg-white rounded-3xl outline-none border border-gray-100 font-medium">
            <option value="Instapay">Instapay</option>
            <option value="Vodafone">Vodafone Cash</option>
            <option value="Bank">تحويل بنكي</option>
        </select>

        <button onclick="createAd()" 
                class="w-full okx-bg-green py-6 rounded-3xl font-bold text-lg shadow-lg active:scale-95 transition">
            نشر الإعلان الآن
        </button>
    </div>
</div>

<!-- Bottom Navigation -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t py-3 z-50 flex justify-around">
    <div onclick="showPage('p2p')" class="nav-item active flex flex-col items-center">
        <i class="fa-solid fa-house text-2xl mb-1"></i>
        <span>السوق</span>
    </div>
    <div onclick="showPage('ads')" class="nav-item flex flex-col items-center">
        <i class="fa-solid fa-bullhorn text-2xl mb-1"></i>
        <span>إعلاناتي</span>
    </div>
    <div onclick="showPage('orders')" class="nav-item flex flex-col items-center">
        <i class="fa-solid fa-receipt text-2xl mb-1"></i>
        <span>طلباتي</span>
    </div>
</div>

<script type="module" src="src/js/main.js"></script>
</body>
</html>
