// --- [4.1. Web3 Escrow Functions] ---
async function lockUSDT(amount, orderId) {
    try {
        if (!tronWeb) throw new Error('Wallet not connected');
        
        const usdtContract = await tronWeb.contract().at(USDT_CONTRACT);
        const balance = await usdtContract.balanceOf(tronWeb.defaultAddress.base58).call();
        
        if ((balance / 1e6) < amount) {
            throw new Error('Insufficient USDT balance');
        }
        
        // Approve escrow contract to spend USDT
        const approveTx = await usdtContract.approve(ESCROW_CONTRACT, tronWeb.toSun(amount * 1e6)).send({
            feeLimit: 100000000,
            callValue: 0,
            shouldPollResponse: true
        });
        
        // Lock USDT in escrow
        const escrowContract = await tronWeb.contract().at(ESCROW_CONTRACT);
        const lockTx = await escrowContract.lock(orderId, tronWeb.toSun(amount * 1e6)).send({
            feeLimit: 100000000,
            callValue: 0,
            shouldPollResponse: true
        });
        
        return { success: true, approveTx, lockTx };
    } catch (error) {
        console.error('Lock USDT error:', error);
        return { success: false, error: error.message };
    }
}

async function releaseUSDT(orderId) {
    try {
        if (!tronWeb) throw new Error('Wallet not connected');
        
        const escrowContract = await tronWeb.contract().at(ESCROW_CONTRACT);
        const releaseTx = await escrowContract.release(orderId).send({
            feeLimit: 100000000,
            callValue: 0,
            shouldPollResponse: true
        });
        
        return { success: true, releaseTx };
    } catch (error) {
        console.error('Release USDT error:', error);
        return { success: false, error: error.message };
    }
}

async function checkUSDTBalance(address) {
    try {
        if (!tronWeb) return 0;
        const contract = await tronWeb.contract().at(USDT_CONTRACT);
        const balance = await contract.balanceOf(address).call();
        return balance / 1e6;
    } catch (error) {
        console.error('Balance check error:', error);
        return 0;
    }
}

async function handlePublishAd() {
    if(!tronWeb) return Swal.fire("اربط محفظتك أولاً");
    
    const price = document.getElementById('priceIn').value;
    const amount = document.getElementById('amountIn').value;
    const min = document.getElementById('minIn').value;
    const max = document.getElementById('maxIn').value;
    const pay = document.getElementById('payIn').value;
    const myAddr = tronWeb.defaultAddress.base58;

    if(!price || !amount || !min || !max || !pay) return Swal.fire("يرجى ملء جميع البيانات");

    // [أمان العمليات]: التاجر ينشر إعلان بيع (أخضر) -> يجب التحقق من رصيده وحجز العملات
    if(adFormMode === 'buy') {
        try {
            const balance = await checkUSDTBalance(myAddr);
            if(balance < parseFloat(amount)) {
                return Swal.fire("عذراً، رصيدك في المحفظة أقل من الكمية المحددة للإعلان.");
            }
            
            Swal.fire({
                title: 'حجز العملات',
                text: `سيتم حجز ${amount} USDT في العقد الذكي`,
                icon: 'info',
                showCancelButton: true,
                confirmButtonText: 'تأكيد الحجز'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const lockResult = await lockUSDT(parseFloat(amount), 'AD-' + Date.now());
                    if (!lockResult.success) {
                        return Swal.fire("فشل حجز العملات: " + lockResult.error);
                    }
                    
                    await saveAdToDatabase();
                }
            });
            return;
        } catch(e) { return Swal.fire("فشل التحقق من المحفظة: " + e.message); }
    }
    
    await saveAdToDatabase();
}

}

// --- [7. إنشاء طلب (Order) والتحقق من رصيد الطرف الآخر] ---
async function createOrder(adId, owner, adType) {
    if(!tronWeb) return Swal.fire("اربط محفظتك");
    const myAddr = tronWeb.defaultAddress.base58;
    if(myAddr === owner) return Swal.fire("لا يمكنك التداول مع نفسك!");

    try {
        const adSnap = await db.collection("ads").doc(adId).get();
        const adData = adSnap.data();
        
        // Use Firestore transaction for atomic operations
        await db.runTransaction(async (transaction) => {
            const adRef = db.collection("ads").doc(adId);
            const adDoc = await transaction.get(adRef);
            
            if (!adDoc.exists) {
                throw new Error('Ad no longer exists');
            }
            
            const currentAmount = parseFloat(adDoc.data().amount);
            
            // [أمان العمليات]: لو المشتري دخل على إعلان (أحمر) لبيع USDT للتاجر، لازم نتأكد من رصيد المشتري
            if(adType === 'sell') {
                const balance = await checkUSDTBalance(myAddr);
                if(balance < currentAmount) {
                    throw new Error('ليس لديك رصيد كافٍ لإتمام عملية البيع للتاجر');
                }
                
                // Lock buyer's USDT for sell ads
                const lockResult = await lockUSDT(currentAmount, 'ORDER-' + Date.now());
                if (!lockResult.success) {
                    throw new Error('فشل حجز العملات: ' + lockResult.error);
                }
            }
            
            // Decrease available amount atomically
            const newAmount = Math.max(0, currentAmount - 1); // Assuming 1 USDT per order, adjust as needed
            transaction.update(adRef, { amount: newAmount.toString() });
            
            // Create order
            const oId = "ORD-" + Math.floor(100000 + Math.random() * 900000);
            const orderRef = db.collection("orders").doc(oId);
            transaction.set(orderRef, {
                adId, adOwner: owner, taker: myAddr, type: adType,
                status: 'pending', isPaid: false, createdAt: Date.now(),
                amount: '1', // Default order amount
                price: adData.price
            });
            
            // Play notification sound
            playNotificationSound('new_order');
            
            return oId;
        });
        
        navTo('orders', 1);
        
    } catch (error) {
        console.error('Create order error:', error);
        Swal.fire('خطأ في إنشاء الطلب: ' + error.message);
    }
}

        let html = "";
        for(let doc of myOrders) {
            const o = doc.data();
            const adDoc = await db.collection("ads").doc(o.adId).get();
            const adData = adDoc.data() || { price: 0, amount: 0 };
            
            const isOwner = myAddr === o.adOwner;
            const amIBuyer = (o.type === 'buy' && !isOwner) || (o.type === 'sell' && isOwner);
            const amISeller = !amIBuyer;

            html += `
            <div class="p-4 border rounded-2xl bg-white card-shadow">
                <div class="flex justify-between items-center border-b pb-2 mb-3">
                    <span class="text-[10px] font-bold text-gray-400">#${doc.id} | ${o.type==='buy'?'شراء':'بيع'}</span>
                    <div class="flex gap-2">
                        <button onclick="openChat('${doc.id}', ${o.createdAt})" class="text-blue-600 text-[10px] font-bold bg-blue-50 px-3 py-1 rounded">
                            <i class="fa-solid fa-comments"></i> المحادثة
                        </button>
                        <button onclick="openAppeal('${doc.id}')" class="text-orange-600 text-[10px] font-bold bg-orange-50 px-3 py-1 rounded">
                            <i class="fa-solid fa-exclamation-triangle"></i> دعم فني
                        </button>
                    </div>
                </div>
                <div class="flex justify-between items-end">
                    <div>
                        <div class="text-lg font-black price-font">${adData.price} EGP</div>
                        <div class="text-[11px] text-gray-500 font-medium">الكمية: ${o.amount || '1'} USDT</div>
                    </div>
                    <div class="flex flex-col gap-2">
                        ${currentOrderFilter === 'pending' ? `
                            ${amIBuyer && !o.isPaid ? `<button onclick="confirmPay('${doc.id}')" class="bg-black text-white px-5 py-2 rounded-lg text-xs font-bold">تم الدفع</button>` : ''}
                            ${amISeller && o.isPaid ? `<button onclick="releaseCrypto('${doc.id}')" class="bg-green-600 text-white px-5 py-2 rounded-lg text-xs font-bold">تحرير العملات</button>` : ''}
                            ${amISeller && !o.isPaid ? `<span class="text-orange-500 text-[10px] font-bold">انتظار الدفع...</span>` : ''}
                            ${canCancelOrder(o, isOwner) ? `<button onclick="cancelReq('${doc.id}')" class="text-red-500 text-[9px] mt-1 font-bold">إلغاء الطلب</button>` : ''}
                        ` : ''}
                    </div>
                </div>
            </div>`;
        }
        list.innerHTML = html || "<p class='text-center text-gray-400 mt-10 text-xs'>لا يوجد طلبات حالياً</p>";
    });
}

function canCancelOrder(order, isOwner) {
    // In Sell Ads (Green): Only the Buyer can cancel
    // In Buy Ads (Red): Only the Merchant can cancel
    if (order.type === 'buy') {
        return !isOwner; // Only buyer (taker) can cancel sell ads
    } else {
        return isOwner; // Only merchant (ad owner) can cancel buy ads
    }
}

// --- [9. منطق الدردشة الفورية] ---
let timerFrozen = false;

function openChat(id, time) {
    activeOrderId = id;
    document.getElementById('chatOverlay').style.display = 'flex';
    document.getElementById('chatHeaderName').innerText = "رقم الطلب: " + id;
    
    clearInterval(timerInt);
    timerFrozen = false;
    
    timerInt = setInterval(() => {
        if (timerFrozen) return; // Don't update if frozen
        
        const remain = (time + (15 * 60 * 1000)) - Date.now();
        if(remain <= 0) { 
            document.getElementById('timerDisplay').innerText = "انتهى الوقت";
            document.getElementById('timerDisplay').className = "text-red-600 font-bold text-xs";
            clearInterval(timerInt);
            
            // Auto-cancel order if time expires
            db.collection("orders").doc(id).update({ status: 'cancelled' });
        } else {
            const m = Math.floor(remain / 60000), s = Math.floor((remain % 60000) / 1000);
            document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            document.getElementById('timerDisplay').className = remain < 300000 ? "text-red-600 font-bold text-xs animate-pulse" : "text-red-600 font-bold text-xs";
        }
    }, 1000);

    rtdb.ref('chats/' + id).on('value', snap => {
        const data = snap.val() ? Object.values(snap.val()) : [];
        const myAddr = tronWeb.defaultAddress.base58;
        document.getElementById('chatBody').innerHTML = data.map(m => `
            <div class="flex ${m.sender === myAddr ? 'justify-end' : 'justify-start'}">
                <div class="max-w-[80%] p-3 rounded-2xl text-sm ${m.sender === myAddr ? 'bg-black text-white rounded-br-none' : 'bg-white border text-black rounded-bl-none shadow-sm'}">
                    ${m.text}
                    <div class="text-[9px] opacity-60 mt-1">${new Date(m.time).toLocaleTimeString('ar-EG')}</div>
                </div>
            </div>`).join('');
        const b = document.getElementById('chatBody'); b.scrollTop = b.scrollHeight;
    });
}

function sendMsg() {
    const inp = document.getElementById('chatInput');
    if(!inp.value || !activeOrderId) return;
    rtdb.ref('chats/' + activeOrderId).push({ 
        sender: tronWeb.defaultAddress.base58, 
        text: inp.value, 
        time: Date.now() 
    });
    inp.value = "";
    
    // Play notification for new message
    playNotificationSound('new_message');
}

function closeChat() { 
    document.getElementById('chatOverlay').style.display = 'none'; 
    clearInterval(timerInt); 
    timerFrozen = false;
}

// --- [10. عمليات الطلب] ---
function confirmPay(id) { 
    Swal.fire({
        title: 'تأكيد الدفع؟',
        text: 'بعد التأكيد سيتم تجميد المؤقت وانتظار تحرير العملات من التاجر',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'نعم، قمت بالدفع',
        cancelButtonText: 'إلغاء'
    }).then((result) => {
        if (result.isConfirmed) {
            db.collection("orders").doc(id).update({ 
                isPaid: true,
                paidAt: Date.now()
            });
            
            // Freeze the timer
            timerFrozen = true;
            document.getElementById('timerDisplay').innerText = "في انتظار التحرير";
            document.getElementById('timerDisplay').className = "text-orange-600 font-bold text-xs";
            
            Swal.fire('تم تأكيد الدفع!', 'الرجاء انتظار تحرير العملات من التاجر', 'success');
        }
    });
}

async function releaseCrypto(id) {
    Swal.fire({
        title: 'تأكيد تحرير العملات؟',
        text: 'سيتم تحرير USDT للمشتري فوراً',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'تحرير العملات',
        cancelButtonText: 'إلغاء'
    }).then(async (result) => {
        if (result.isConfirmed) {
            const releaseResult = await releaseUSDT(id);
            
            if (releaseResult.success) {
                await db.collection("orders").doc(id).update({ 
                    status: 'completed',
                    completedAt: Date.now()
                });
                Swal.fire("تم تحرير العملات بنجاح");
            } else {
                Swal.fire("فشل تحرير العملات: " + releaseResult.error);
            }
        }
    });
}

function cancelReq(id) {
    Swal.fire({
        title: 'إلغاء الطلب؟',
        text: 'سيتم إلغاء الطلب وإرجاع العملات المحجوزة',
        icon: 'warning', 
        showCancelButton: true,
        confirmButtonText: 'تأكيد الإلغاء',
        cancelButtonText: 'تراجع'
    }).then(async (r) => {
        if(r.isConfirmed) {
            // In a real implementation, you would also call the smart contract to refund
            await db.collection("orders").doc(id).update({ 
                status: 'cancelled',
                cancelledAt: Date.now()
            });
            Swal.fire('تم إلغاء الطلب');
        }
    });
}

function openAppeal(orderId) {
    Swal.fire({
        title: 'الدعم الفني',
        html: `
            <p>إذا واجهت أي مشكلة في هذا الطلب، يمكنك التواصل مع الدعم الفني:</p>
            <a href="${TELEGRAM_SUPPORT_LINK}" target="_blank" 
               class="bg-blue-500 text-white px-4 py-2 rounded-lg inline-block mt-3">
                <i class="fa-brands fa-telegram"></i> فتح تذكرة دعم
            </a>
            <p class="text-xs text-gray-500 mt-2">رقم الطلب: ${orderId}</p>
        `,
        icon: 'info',
        confirmButtonText: 'حسناً'
    });
}

function playNotificationSound(type) {
    if (!notificationAudio) return;
    
    try {
        notificationAudio.currentTime = 0;
        notificationAudio.play().catch(e => console.log('Audio play failed:', e));
    } catch (error) {
        console.log('Notification sound error:', error);
    }
}

// --- [11. إدارة إعلاناتي] ---
function filterMyAds(f, btn) {
    currentAdFilter = f;
    document.querySelectorAll('#adsPage .tab-active').forEach(b => b.classList.remove('tab-active'));
    btn.classList.add('tab-active');
    renderMyAds();
}

function renderMyAds() {
    const container = document.getElementById('myAdsList');
    const myAddr = tronWeb?.defaultAddress?.base58;
    if(!myAddr) return;

    db.collection("ads").where("owner", "==", myAddr).onSnapshot(snap => {
        const ads = snap.docs.map(d => ({id: d.id, ...d.data()}));
        const filtered = ads.filter(a => currentAdFilter === 'active' ? a.status === 'active' : a.status !== 'active');
        document.getElementById('countActive').innerText = ads.filter(a => a.status === 'active').length;

        container.innerHTML = filtered.map(a => `
            <div class="p-4 border rounded-2xl">
                <div class="flex justify-between mb-2">
                    <span class="text-xs font-bold ${a.type==='buy'?'text-green-600':'text-red-600'}">${a.type==='buy'?'بيع':'شراء'}</span>
                    <button onclick="toggleAd('${a.id}', '${a.status}')" class="text-[10px] text-blue-600 font-bold">تبديل الحالة</button>
                </div>
                <div class="text-xl font-black">${a.price} EGP</div>
                <div class="text-[10px] text-gray-400 mt-1">${a.amount} USDT | ${a.payMethod}</div>
            </div>`).join('');
    });
}

function toggleAd(id, cur) { db.collection("ads").doc(id).update({ status: cur === 'active' ? 'inactive' : 'active' }); }

window.onload = () => showPage('p2p');
</script>
