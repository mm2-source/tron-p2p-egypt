<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OKX P2P Egypt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700&display=swap');
        body { background-color: #ffffff; font-family: 'IBM Plex Sans Arabic', sans-serif; }
        .page { display: none; padding-bottom: 100px; }
        .page-active { display: block; }
        .price-font { font-family: 'Inter', sans-serif; font-weight: 800; }
        .pay-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: #f3f4f6; color: #1f2937; border-right: 3px solid #fbbf24; }
        .order-card { border: 1px solid #f3f4f6; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        #chatBox { position: fixed; inset: 0; background: white; z-index: 100; display: none; flex-direction: column; }
    </style>
</head>
<body>

<nav class="flex justify-between items-center p-4 border-b bg-white sticky top-0 z-50">
    <div class="flex items-center gap-2">
        <span class="text-2xl font-black uppercase">OKX</span>
        <div id="walletStatus" onclick="connectWallet()" class="text-[10px] bg-red-50 text-red-600 px-3 py-1 rounded-full font-bold cursor-pointer">ربط المحفظة</div>
    </div>
    <div class="flex gap-4">
        <i class="fa-solid fa-plus text-lg" onclick="showPage('create')"></i>
    </div>
</nav>

<div id="p2pPage" class="page page-active">
    <div class="flex gap-8 px-4 border-b bg-white sticky top-[65px] z-40">
        <button class="tab-btn active border-b-2 border-black py-2" onclick="setMarket('buy', this)">شراء</button>
        <button class="tab-btn py-2 text-gray-400" onclick="setMarket('sell', this)">بيع</button>
    </div>
    <div id="marketList" class="px-4 mt-4 space-y-6"></div>
</div>

<div id="ordersPage" class="page px-4">
    <div class="flex gap-4 border-b mt-4 overflow-x-auto">
        <button onclick="renderOrders('pending', this)" class="tab-btn active text-sm pb-2 border-b-2 border-black">قيد التنفيذ</button>
        <button onclick="renderOrders('completed', this)" class="tab-btn text-sm pb-2 text-gray-400">مكتملة</button>
        <button onclick="renderOrders('cancelled', this)" class="tab-btn text-sm pb-2 text-gray-400">ملغي</button>
    </div>
    <div id="ordersList" class="mt-4 space-y-4"></div>
</div>

<div id="createPage" class="page px-4">
    <div class="flex items-center gap-4 py-4 border-b mb-4">
        <i class="fa-solid fa-arrow-right" onclick="showPage('p2p')"></i>
        <span class="font-bold">إنشاء إعلان جديد</span>
    </div>
    <div class="space-y-4">
        <div class="bg-gray-100 p-1 rounded-xl flex">
            <button id="formBuy" onclick="setFormType('buy')" class="flex-1 py-2 rounded-lg font-bold bg-white text-green-600 shadow-sm">بيع USDT (أخضر)</button>
            <button id="formSell" onclick="setFormType('sell')" class="flex-1 py-2 rounded-lg font-bold text-gray-400">شراء USDT (أحمر)</button>
        </div>
        <input id="inPrice" type="number" placeholder="السعر (EGP)" class="w-full p-4 bg-gray-50 rounded-xl outline-none price-font text-lg">
        <input id="inAmount" type="number" placeholder="الكمية الكلية (USDT)" class="w-full p-4 bg-gray-50 rounded-xl outline-none price-font">
        <div class="flex gap-2">
            <input id="inMin" type="number" placeholder="الحد الأدنى" class="flex-1 p-4 bg-gray-50 rounded-xl outline-none">
            <input id="inMax" type="number" placeholder="الحد الأقصى" class="flex-1 p-4 bg-gray-50 rounded-xl outline-none">
        </div>
        <select id="inPayment" class="w-full p-4 bg-gray-50 rounded-xl font-bold outline-none">
            <option value="Instapay">Instapay</option>
            <option value="Vodafone Cash">Vodafone Cash</option>
            <option value="Bank Transfer">Bank Transfer</option>
        </select>
        <button onclick="validateAndSubmit()" class="w-full py-4 rounded-full font-bold bg-black text-white shadow-lg">تأكيد ونشر</button>
    </div>
</div>

<div id="chatBox">
    <div class="p-4 border-b flex justify-between items-center bg-white shadow-sm">
        <span id="chatOrderTitle" class="font-bold">دردشة الطلب</span>
        <i class="fa-solid fa-xmark text-xl" onclick="closeChat()"></i>
    </div>
    <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50"></div>
    <div class="p-4 border-t bg-white flex gap-2">
        <input id="chatInput" type="text" placeholder="اكتب رسالة..." class="flex-1 p-3 bg-gray-100 rounded-xl outline-none">
        <button onclick="sendChatMessage()" class="bg-black text-white px-6 rounded-xl font-bold">إرسال</button>
    </div>
</div>

<div class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-4 z-50">
    <div onclick="showPage('p2p')" id="nav-p2p" class="text-center active"><i class="fa-solid fa-house"></i><div class="text-[10px]">P2P</div></div>
    <div onclick="showPage('orders')" id="nav-orders" class="text-center"><i class="fa-solid fa-receipt"></i><div class="text-[10px]">الطلبات</div></div>
    <div onclick="showPage('ads')" id="nav-ads" class="text-center"><i class="fa-solid fa-bullhorn"></i><div class="text-[10px]">إعلاناتي</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script type="module" src="src/js/main.js"></script>
</body>
</html>
