<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OKX P2P Ultimate V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700&display=swap');
        body { background-color: #ffffff; font-family: 'IBM Plex Sans Arabic', sans-serif; -webkit-tap-highlight-color: transparent; }
        .page { display: none; padding-bottom: 100px; }
        .page-active { display: block; }
        .nav-container { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { position: relative; display: flex; flex-direction: column; align-items: center; width: 25%; z-index: 10; cursor: pointer; color: #9ca3af; transition: color 0.3s; }
        .nav-item.active { color: #000; font-weight: bold; }
        .nav-indicator { position: absolute; bottom: 8px; height: 42px; background: #f3f4f6; border-radius: 12px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; width: 20%; }
        .tab-btn.active, .order-tab.active { border-bottom: 2px solid #000; color: #000; font-weight: bold; }
        .price-font { font-family: 'Inter', sans-serif; font-weight: 800; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        #chatBox { position: fixed; inset: 0; background: white; z-index: 2000; display: none; flex-direction: column; }
    </style>
</head>
<body>

<div id="app">
    <nav class="flex justify-between items-center p-4 border-b bg-white sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-black italic">OKX</span>
            <div id="walletStatus" onclick="connectWallet()" class="text-[10px] bg-red-50 text-red-600 px-3 py-1 rounded-full font-bold cursor-pointer">ربط المحفظة</div>
        </div>
        <div class="flex gap-4 items-center">
            <i class="fa-solid fa-calculator text-gray-600"></i>
            <i class="fa-solid fa-plus text-lg" onclick="showPage('create')"></i>
        </div>
    </nav>

    <div id="p2pPage" class="page page-active">
        <div class="flex justify-between items-center px-4 border-b bg-white">
            <div class="flex gap-6">
                <button class="tab-btn active py-3 text-lg" onclick="setMarket('buy', this)">شراء</button>
                <button class="tab-btn py-3 text-gray-400 text-lg font-bold" onclick="setMarket('sell', this)">بيع</button>
            </div>
            <div class="flex items-center gap-1 font-bold text-sm">
                USDT <i class="fa-solid fa-chevron-down text-[10px]"></i>
            </div>
        </div>
        
        <div class="flex gap-2 p-3 overflow-x-auto border-b bg-gray-50">
            <button class="bg-white border rounded px-4 py-1.5 text-xs font-bold whitespace-nowrap">المبلغ <i class="fa-solid fa-chevron-down ml-1"></i></button>
            <button class="bg-white border rounded px-4 py-1.5 text-xs font-bold whitespace-nowrap">طريقة الدفع <i class="fa-solid fa-chevron-down ml-1"></i></button>
            <button class="bg-white border rounded px-4 py-1.5 text-xs font-bold whitespace-nowrap"><i class="fa-solid fa-filter"></i></button>
        </div>

        <div id="marketList" class="px-4 mt-2 space-y-5"></div>
    </div>

    <div id="adsPage" class="page">
        <div class="flex px-4 border-b gap-6">
            <button onclick="switchAdTab('active', this)" class="ad-tab py-3 text-sm font-bold border-b-2 border-black">نشط <span id="activeCount" class="bg-gray-100 px-1.5 rounded">0</span></button>
            <button onclick="switchAdTab('inactive', this)" class="ad-tab py-3 text-sm text-gray-400">غير نشط <span id="inactiveCount">0</span></button>
        </div>
        <div id="myAdsContainer" class="px-4 mt-6"></div>
    </div>

    <div id="ordersPage" class="page">
        <div class="flex px-4 border-b">
            <button onclick="switchOrderTab('pending', this)" class="order-tab active flex-1 py-3 text-sm text-gray-400">قيد التنفيذ</button>
            <button onclick="switchOrderTab('completed', this)" class="order-tab flex-1 py-3 text-sm text-gray-400 font-bold">مكتملة</button>
            <button onclick="switchOrderTab('cancelled', this)" class="order-tab flex-1 py-3 text-sm text-gray-400 font-bold">ملغي</button>
        </div>
        <div id="ordersList" class="px-4 mt-4 space-y-4"></div>
    </div>

    <div id="createPage" class="page px-4">
        <div class="py-4 flex items-center gap-4 border-b mb-4">
            <i class="fa-solid fa-xmark text-lg cursor-pointer" onclick="showPage('p2p')"></i>
            <span class="font-bold">إنشاء إعلان</span>
        </div>
        <div class="bg-gray-100 p-1 rounded-xl flex mb-6">
            <button id="formBuy" onclick="setFormType('buy')" class="flex-1 py-3 rounded-lg font-bold bg-white text-green-600 shadow-sm">بيع (أخضر)</button>
            <button id="formSell" onclick="setFormType('sell')" class="flex-1 py-3 rounded-lg font-bold text-gray-400">شراء (أحمر)</button>
        </div>
        <div class="space-y-6">
            <div>
                <label class="text-xs text-gray-400 block mb-2">السعر الثابت</label>
                <div class="flex border-b pb-2 items-center">
                    <input id="inPrice" type="number" placeholder="0.00" class="flex-1 text-2xl font-bold outline-none price-font">
                    <span class="font-bold">EGP</span>
                </div>
            </div>
            <div>
                <label class="text-xs text-gray-400 block mb-2">إجمالي الكمية (USDT)</label>
                <div class="flex border-b pb-2 items-center">
                    <input id="inAmount" type="number" placeholder="أدخل الكمية" class="flex-1 text-2xl font-bold outline-none price-font">
                    <span class="font-bold text-gray-400">USDT</span>
                </div>
            </div>
            
            <div>
                <label class="text-xs text-gray-400 block mb-2">حدود المعاملة (EGP)</label>
                <div class="flex gap-4">
                    <div class="flex-1 border-b pb-2">
                        <input id="inMin" type="number" placeholder="الحد الأدنى" class="w-full text-lg font-bold outline-none price-font">
                    </div>
                    <span class="mt-2 text-gray-400">~</span>
                    <div class="flex-1 border-b pb-2">
                        <input id="inMax" type="number" placeholder="الحد الأقصى" class="w-full text-lg font-bold outline-none price-font">
                    </div>
                </div>
            </div>

            <div>
                <label class="text-xs text-gray-400 block mb-2">طريقة الدفع</label>
                <input id="inPayMethod" type="text" placeholder="مثال: فودافون كاش، إنستا باي" class="w-full border-b pb-2 text-lg font-bold outline-none">
            </div>

            <button onclick="publishAd()" class="w-full py-4 bg-black text-white rounded-full font-bold mt-10 shadow-lg">تأكيد النشر</button>
        </div>
    </div>

    <div id="chatBox">
        <div class="p-4 border-b flex justify-between items-center bg-white sticky top-0 shadow-sm">
            <i class="fa-solid fa-chevron-right cursor-pointer text-lg" onclick="closeChat()"></i>
            <div class="text-center">
                <div id="chatTitle" class="font-bold text-sm"></div>
                <div id="chatTimer" class="text-red-500 font-bold text-xs mt-1">15:00</div>
            </div>
            <i class="fa-solid fa-circle-info text-gray-400"></i>
        </div>
        <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50"></div>
        <div class="p-4 border-t bg-white flex gap-2">
            <input id="chatInput" type="text" placeholder="اكتب رسالة..." class="flex-1 p-3 bg-gray-100 rounded-full outline-none px-5">
            <button onclick="sendMessage()" class="bg-black text-white w-12 h-12 rounded-full"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="nav-container">
        <div id="navIndicator" class="nav-indicator" style="right: 2.5%;"></div>
        <div onclick="navTo('p2p', 0)" class="nav-item active"><i class="fa-solid fa-house"></i><span class="text-[10px] mt-1">P2P</span></div>
        <div onclick="navTo('orders', 1)" class="nav-item"><i class="fa-solid fa-receipt"></i><span class="text-[10px] mt-1">الطلبات</span></div>
        <div onclick="navTo('ads', 2)" class="nav-item"><i class="fa-solid fa-bullhorn"></i><span class="text-[10px] mt-1">إعلاناتي</span></div>
        <div onclick="navTo('profile', 3)" class="nav-item"><i class="fa-solid fa-user"></i><span class="text-[10px] mt-1">صفحتي</span></div>
    </div>
</div>

<script>
// --- تهيئة Firebase ---
const firebaseConfig = {
    apiKey: "AIzaSyClJPT4UQsy9XmV4JB34rt0rYUB-FefyXY",
    authDomain: "mustafa-dbece.firebaseapp.com",
    databaseURL: "https://mustafa-dbece-default-rtdb.firebaseio.com",
    projectId: "mustafa-dbece",
    storageBucket: "mustafa-dbece.appspot.com",
    messagingSenderId: "692060842077",
    appId: "1:692060842077:web:04f0598199c58d403d05b4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const rtdb = firebase.database();

// --- المتغيرات العامة ---
let tronWeb = null;
let marketType = 'buy'; // buy = السوق اللي التاجر بيبيع فيه (أخضر), sell = السوق اللي التاجر بيشتري فيه (أحمر)
let adTab = 'active';
let currentOrderTab = 'pending';
let activeChatId = null;
let chatInterval = null;

const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; // عقد USDT على شبكة ترون
// const ESCROW_CONTRACT = "YOUR_SMART_CONTRACT_ADDRESS"; // [مكان ربط العقد الذكي للحجز]

// --- التنقل والواجهة ---
function navTo(page, index) {
    const pos = ['2.5%', '27.5%', '52.5%', '77.5%'];
    document.getElementById('navIndicator').style.right = pos[index];
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-item')[index].classList.add('active');
    showPage(page);
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
    document.getElementById(id + 'Page').classList.add('page-active');
    if(id === 'p2p') renderMarket();
    if(id === 'ads') renderMyAds();
    if(id === 'orders') renderOrders();
}

// --- المحفظة ---
async function connectWallet() {
    if (window.tronLink) {
        await window.tronLink.request({ method: "tron_requestAccounts" });
        tronWeb = window.tronLink.tronWeb;
        document.getElementById('walletStatus').innerText = "متصل";
        document.getElementById('walletStatus').className = "text-[10px] bg-green-50 text-green-600 px-3 py-1 rounded-full font-bold";
        renderMarket();
    } else {
        Swal.fire("يرجى تثبيت TronLink");
    }
}

// --- نشر الإعلان ---
async function publishAd() {
    if(!tronWeb) return Swal.fire("اربط المحفظة أولاً");
    
    const price = document.getElementById('inPrice').value;
    const amount = document.getElementById('inAmount').value;
    const min = document.getElementById('inMin').value;
    const max = document.getElementById('inMax').value;
    const payMethod = document.getElementById('inPayMethod').value;
    
    if(!price || !amount || !min || !max || !payMethod) return Swal.fire("يرجى إكمال جميع البيانات");
    
    const isBuyMarketAd = document.getElementById('formBuy').classList.contains('bg-white'); // أخضر
    const type = isBuyMarketAd ? 'buy' : 'sell'; 
    const myAddr = tronWeb.defaultAddress.base58;

    // حماية التاجر (تأكيد الرصيد للإعلان الأخضر فقط)
    if(type === 'buy') {
        try {
            const contract = await tronWeb.contract().at(USDT_CONTRACT);
            const bal = await contract.balanceOf(myAddr).call();
            if((bal / 1e6) < parseFloat(amount)) {
                return Swal.fire("رصيد USDT غير كافٍ لنشر إعلان البيع");
            }
            // [مكان ربط العقد الذكي للحجز]: هنا تستدعي دالة deposit في العقد بتاعك
            // await escrowContract.deposit(amount).send();
        } catch (e) {
            return Swal.fire("خطأ في التحقق من الرصيد");
        }
    }

    await db.collection("ads").add({
        type, price, amount, min, max, payMethod, owner: myAddr, status: 'active', createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    
    Swal.fire({ icon: 'success', title: 'تم', text: 'تم نشر الإعلان بنجاح', timer: 1500 });
    showPage('p2p');
}

// --- عرض السوق ---
function setMarket(t, btn) {
    marketType = t;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'font-bold'));
    btn.classList.add('active', 'font-bold');
    renderMarket();
}

function renderMarket() {
    const container = document.getElementById('marketList');
    db.collection("ads").where("status", "==", "active").where("type", "==", marketType).onSnapshot(snap => {
        container.innerHTML = snap.docs.map(doc => {
            const a = doc.data();
            const btnColor = marketType === 'buy' ? 'bg-green-600' : 'bg-red-600';
            const btnText = marketType === 'buy' ? 'شراء' : 'بيع';
            
            return `
            <div class="border-b pb-5">
                <div class="flex justify-between items-start mb-2">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-zinc-100 rounded-full flex items-center justify-center font-bold text-xs">S</div>
                        <div>
                            <div class="font-bold text-sm">Shark_${a.owner.slice(0,4)} <i class="fa-solid fa-circle-check text-blue-500 text-[10px]"></i></div>
                            <div class="text-[10px] text-gray-400">متصل الآن</div>
                        </div>
                    </div>
                    <div class="text-[10px] text-gray-400">الحدود: ${a.min} - ${a.max} EGP</div>
                </div>
                <div class="flex justify-between items-end">
                    <div>
                        <div class="text-2xl font-black price-font">${a.price} <span class="text-xs font-normal">EGP</span></div>
                        <div class="text-[11px] text-gray-500 mt-1">الكمية المتاحة: <span class="text-black font-medium">${a.amount} USDT</span></div>
                        <div class="flex gap-2 mt-2">
                            <span class="border-r pr-2 text-[10px] text-orange-500 font-bold">${a.payMethod}</span>
                        </div>
                    </div>
                    <button onclick="openOrder('${doc.id}', '${a.owner}', '${a.type}')" class="${btnColor} text-white px-7 py-2 rounded-lg font-bold text-sm shadow-sm">
                        ${btnText}
                    </button>
                </div>
            </div>`;
        }).join('');
    });
}

// --- فتح طلب (Order) ---
async function openOrder(adId, ownerAddr, adType) {
    if(!tronWeb) return Swal.fire("اربط المحفظة أولاً");
    const myAddr = tronWeb.defaultAddress.base58;
    
    if(myAddr === ownerAddr) {
        return Swal.fire({ icon: 'error', title: 'مرفوض', text: 'لا يمكنك تنفيذ طلب على إعلانك الخاص!' });
    }

    // إذا كان إعلان أحمر (المستخدم هيبيع USDT للتاجر)، نفحص رصيد المستخدم أولاً
    if(adType === 'sell') {
        try {
            const adDoc = await db.collection("ads").doc(adId).get();
            const requiredAmount = adDoc.data().amount;
            const contract = await tronWeb.contract().at(USDT_CONTRACT);
            const bal = await contract.balanceOf(myAddr).call();
            if((bal / 1e6) < parseFloat(requiredAmount)) {
                return Swal.fire("رصيد USDT غير كافٍ لبيع هذه الكمية");
            }
            // [مكان ربط العقد الذكي للحجز]: المستخدم العادي بيحجز عملاته هنا
            // await escrowContract.deposit(requiredAmount).send();
        } catch (e) {
            return Swal.fire("خطأ في التحقق من الرصيد");
        }
    }

    const orderId = "ORD" + Date.now().toString().slice(-6);
    await db.collection("orders").doc(orderId).set({
        adId, adOwner: ownerAddr, taker: myAddr, type: adType,
        status: 'pending', isPaid: false, createdAt: Date.now()
    });

    Swal.fire({ icon: 'success', title: 'تم إنشاء الطلب', showConfirmButton: false, timer: 1000 });
    navTo('orders', 1);
}

// --- عرض الطلبات ---
function switchOrderTab(tab, btn) {
    currentOrderTab = tab;
    document.querySelectorAll('.order-tab').forEach(b => {
        b.classList.remove('active', 'text-black', 'font-bold');
        b.classList.add('text-gray-400');
    });
    btn.classList.add('active', 'text-black', 'font-bold');
    btn.classList.remove('text-gray-400');
    renderOrders();
}

function renderOrders() {
    const container = document.getElementById('ordersList');
    const myAddr = tronWeb?.defaultAddress?.base58;
    if(!myAddr) return container.innerHTML = "";

    db.collection("orders").where("status", "==", currentOrderTab).onSnapshot(async snap => {
        const myOrders = snap.docs.filter(d => d.data().adOwner === myAddr || d.data().taker === myAddr);
        
        if(myOrders.length === 0) {
            container.innerHTML = `<div class="text-center mt-10 text-gray-400 text-sm">لا توجد طلبات هنا</div>`;
            return;
        }

        let html = '';
        for(let doc of myOrders) {
            const o = doc.data();
            const adDoc = await db.collection("ads").doc(o.adId).get();
            const ad = adDoc.exists ? adDoc.data() : { price: 0, amount: 0 };
            
            const isAdOwner = (myAddr === o.adOwner);
            const isBuyer = (o.type === 'buy' && !isAdOwner) || (o.type === 'sell' && isAdOwner);
            const isSeller = !isBuyer;

            // منطق الإلغاء
            let canCancel = false;
            if(o.type === 'buy' && !isAdOwner) canCancel = true; // المشتري في الإعلان الأخضر
            if(o.type === 'sell' && isAdOwner) canCancel = true; // صاحب الإعلان الأحمر (لأنه المشتري)

            html += `
            <div class="p-4 border rounded-2xl shadow-sm bg-white mb-3">
                <div class="flex justify-between items-center border-b pb-2 mb-2">
                    <span class="text-[10px] font-bold text-gray-500">#${doc.id} | ${o.type==='buy'?'شراء':'بيع'}</span>
                    <button onclick="openChat('${doc.id}', ${o.createdAt})" class="text-blue-600 text-xs font-bold px-3 py-1 bg-blue-50 rounded">شات مباشر</button>
                </div>
                <div class="flex justify-between items-end">
                    <div>
                        <div class="text-lg font-black">${ad.price} EGP</div>
                        <div class="text-[10px] text-gray-500">الكمية: ${ad.amount} USDT</div>
                    </div>
                </div>
                
                ${currentOrderTab === 'pending' ? `
                    <div class="flex gap-2 mt-4">
                        ${isBuyer && !o.isPaid ? `<button onclick="markPaid('${doc.id}')" class="flex-1 bg-black text-white py-2 rounded-lg text-xs font-bold">تم الدفع</button>` : ''}
                        ${isSeller && o.isPaid ? `<button onclick="releaseCrypto('${doc.id}')" class=
